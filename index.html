<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Criador de Sites</title>
</head>

<body>
  
  <p class="etiqueta">Gerador com Inteligência Artificial</p>
  
  <h1>
    Crie sua Página
    <br>
    <span>com um prompt</span>
  </h1>
  
  <p class="subtitulo">Descreva o seu negócio e veja a <abbr>IA</abbr> criar uma página profissional em segundos.</p>
  
  <div class="caixa-entrada">
    <textarea class="texto-pagina" placeholder="Descreva o seu negócio. Ex: Cafeteria, Restaurante, Mercado..."></textarea>
    
    <button onclick="gerarCodigo()">Gerar</button>
  </div>
  
  <div class="caixa-resultado">
    
    <p class="bloco-codigo"></p>

        <iframe id="preview-site" class="bloco-site" style="width: 100%; height: 600px; border: none; background: white; border-radius: 8px;"></iframe>
    
    
  </div>
  
  <script src="script.js"></script>
</body>
</html>
